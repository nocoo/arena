name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    uses: nocoo/base-ci/.github/workflows/bun-quality.yml@v2026.1
    with:
      test-command: "bun run --filter '@arena/core' test && bun run --filter '@arena/cli' test:unit"
      typecheck-command: "true"
      enable-l2: "false"
    secrets: inherit
